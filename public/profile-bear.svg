  </defs>
  <circle cx="120" cy="120" r="116" fill="url(#bgGrad)"/>
  <!-- 귀 -->
  <circle cx="58" cy="62" r="30" fill="#A9744B"/>
  <circle cx="182" cy="62" r="30" fill="#A9744B"/>
